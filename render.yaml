services:
  - type: web
    name: immoradar
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: ImmoRadar
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://immoradar.onrender.com
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: immoradar-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: REGISTRATION_ACCESS_CODE
        sync: false
      - key: DEMO_LOGIN_ENABLED
        value: true
      - key: DEPLOY_SEED_DEMO
        value: true

databases:
  - name: immoradar-db
    plan: free
    databaseName: immoradar
    user: immoradar
